name: Build ClawApp FPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'ClawApp 版本'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FPK 配置仓库
        uses: actions/checkout@v4
        with:
          path: fpk-repo

      - name: Checkout ClawApp 源码
        uses: actions/checkout@v4
        with:
          repository: qingchencloud/clawapp
          path: clawapp-src
          sparse-checkout: h5/ server/
          sparse-checkout-cone-mode: false

      - name: 下载 fnpack 打包工具
        run: |
          curl -fsSL https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64 -o /usr/local/bin/fnpack
          chmod +x /usr/local/bin/fnpack
          fnpack --version

      - name: 获取版本
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${{ inputs.version }}" != "" ] && VERSION="${{ inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      - name: 构建 H5 前端
        working-directory: clawapp-src/h5
        run: |
          npm install -g pnpm@9
          pnpm install
          pnpm build

      - name: 构建服务端
        working-directory: clawapp-src/server
        run: pnpm install

      - name: ncc 打包服务端
        run: |
          npm install -g @vercel/ncc
          cd clawapp-src
          cp -r h5/dist server/h5_dist
          sed -i 's|\.\./h5/dist|h5_dist|g' server/index.js
          ncc build server/index.js -o dist-server --no-source-map -m

      - name: 组装 FPK 项目
        run: |
          # 复制 fnOS 配置到 /tmp/clawapp/
          cp -r fpk-repo/fnos /tmp/clawapp/

          # 复制 ClawApp 产物到 app/ 目录
          mkdir -p /tmp/clawapp/app/dist
          cp -r clawapp-src/h5/dist/* /tmp/clawapp/app/dist/

          mkdir -p /tmp/clawapp/app/server
          cp clawapp-src/dist-server/index.js /tmp/clawapp/app/server/index.mjs

          # 替换 manifest 中的版本号
          sed -i 's/"version": "1.6.3"/"version": "${{ env.VERSION || '1.6.3' }}"/g' /tmp/clawapp/manifest

          echo "=== FPK 项目结构 ==="
          find /tmp/clawapp -type f | sort

      - name: 打包 FPK
        run: |
          cd /tmp
          fnpack build clawapp
          ls -lh /tmp/clawapp/*.fpk 2>/dev/null || find /tmp/clawapp -name "*.fpk" -ls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawapp-fpk
          path: /tmp/clawapp/*.fpk
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: clawapp-fpk
          path: artifacts
      - name: 发布 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## ClawApp FPK for 飞牛 fnOS
            安装后桌面图标直接打开，无需 Docker。
          files: artifacts/*.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
