name: Build ClawApp FPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'ClawApp 版本（如 1.6.3）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: fnos-app

      - name: 获取版本
        id: version
        run: |
          if [ "${{ inputs.version }}" != "" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 构建
        run: |
          cd fnos-app/scripts/apps/clawapp
          chmod +x *.sh
          bash build.sh "${{ steps.version.outputs.VERSION }}"
          ARCH=$(uname -m | sed 's/x86_64/x86/' | sed 's/aarch64/arm/')
          cp /tmp/app.tgz "clawapp-${{ steps.version.outputs.VERSION }}_${ARCH}.fpk"
          ls -lh *.fpk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawapp-fpk-v${{ steps.version.outputs.VERSION }}
          path: "clawapp-${{ steps.version.outputs.VERSION }}_*.fpk"
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## ClawApp FPK for 飞牛 fnOS
            安装后桌面图标直接打开，无需 Docker。
          files: artifacts/**/*.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
