name: Build ClawApp FPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'ClawApp 版本'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FPK 配置仓库
        uses: actions/checkout@v4
        with:
          path: fpk-repo

      - name: Checkout ClawApp 源码
        uses: actions/checkout@v4
        with:
          repository: qingchencloud/clawapp
          path: clawapp-src
          sparse-checkout: h5/ server/
          sparse-checkout-cone-mode: false

      - name: 获取版本
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${{ inputs.version }}" != "" ] && VERSION="${{ inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      - name: 构建 H5 前端
        working-directory: clawapp-src/h5
        run: |
          npm install -g pnpm@9
          pnpm install
          pnpm build
          echo "=== H5 dist 内容 ==="
          ls -la dist/ 2>/dev/null | head -5

      - name: 构建服务端
        working-directory: clawapp-src/server
        run: |
          pnpm install
          echo "=== server 内容 ==="
          ls

      - name: ncc 打包服务端
        run: |
          npm install -g @vercel/ncc
          cd clawapp-src
          cp -r h5/dist server/h5_dist
          sed -i 's|\.\./h5/dist|h5_dist|g' server/index.js
          ncc build server/index.js -o dist-server --no-source-map -m
          echo "=== dist-server 内容 ==="
          ls -la dist-server/

      - name: 组装 FPK 目录
        run: |
          mkdir -p /tmp/clawapp/cmd
          mkdir -p /tmp/clawapp/config
          mkdir -p /tmp/clawapp/ui/images
          mkdir -p /tmp/clawapp/app/dist
          mkdir -p /tmp/clawapp/app/server

          # 1. manifest
          cat > /tmp/clawapp/manifest << 'MANIFEST'
manifest_type=json
{
  "appname": "clawapp",
  "display_name": "ClawApp",
  "version": "1.6.3",
  "arch": "x86,arm",
  "startup_command": "bash /opt/clawapp/cmd/start",
  "app_dir": "/opt/clawapp/app",
  "ui_dir": "/opt/clawapp/ui",
  "service_port": "3210"
}
MANIFEST

          # 2. cmd/
          cp fpk-repo/fnos/cmd/start /tmp/clawapp/cmd/start
          cp fpk-repo/fnos/cmd/main /tmp/clawapp/cmd/main
          cp fpk-repo/fnos/cmd/stop /tmp/clawapp/cmd/stop
          chmod +x /tmp/clawapp/cmd/*

          # 3. config/
          cp fpk-repo/fnos/config/privilege /tmp/clawapp/config/privilege
          cp fpk-repo/fnos/config/resource /tmp/clawapp/config/resource

          # 4. ui/
          cp fpk-repo/fnos/ui/config /tmp/clawapp/ui/config
          cp fpk-repo/fnos/ICON.PNG /tmp/clawapp/ICON.PNG 2>/dev/null || true
          cp fpk-repo/fnos/ICON_256.PNG /tmp/clawapp/ICON_256.PNG 2>/dev/null || true
          cp fpk-repo/fnos/ui/images/64.png /tmp/clawapp/ui/images/64.png 2>/dev/null || true

          # 5. app/ (ClawApp 产物)
          cp -r clawapp-src/h5/dist/* /tmp/clawapp/app/dist/ 2>/dev/null || true
          cp clawapp-src/dist-server/index.js /tmp/clawapp/app/server/index.mjs

          echo "=== /tmp/clawapp 完整结构 ==="
          find /tmp/clawapp -type f | sort

      - name: 打包 FPK（tar.gz）
        run: |
          cd /tmp
          tar -czvf clawapp.fpk -C /tmp/clawapp .
          ls -lh /tmp/clawapp.fpk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawapp-fpk
          path: /tmp/clawapp.fpk
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: clawapp-fpk
          path: artifacts
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## ClawApp FPK for 飞牛 fnOS
            安装后桌面图标直接打开，无需 Docker。
          files: artifacts/clawapp.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
