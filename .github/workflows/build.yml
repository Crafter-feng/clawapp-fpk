name: Build ClawApp FPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'ClawApp 版本'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ClawApp 源码
        uses: actions/checkout@v4
        with:
          repository: qingchencloud/clawapp
          path: clawapp-src
          sparse-checkout: h5/ server/
          sparse-checkout-cone-mode: false

      - name: 安装 fnOS 构建工具
        run: npm install -g @fnnas/tools

      - name: 获取版本
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${{ inputs.version }}" != "" ] && VERSION="${{ inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 构建 H5 前端
        working-directory: clawapp-src/h5
        run: |
          npm install -g pnpm@9
          pnpm install && pnpm build

      - name: 构建服务端
        working-directory: clawapp-src/server
        run: pnpm install

      - name: ncc 打包服务端
        run: |
          npm install -g @vercel/ncc
          cd clawapp-src
          cp -r h5/dist server/h5_dist
          sed -i 's|\\.\\./h5/dist|h5_dist|g' server/index.js
          ncc build server/index.js -o dist-server --no-source-map -m

      - name: 创建 FPK 项目
        run: |
          cd /tmp
          fnpack create clawapp
          ls -la clawapp/

      - name: 复制构建产物到 app 目录
        run: |
          cp -r clawapp-src/h5/dist/. /tmp/clawapp/app/
          mkdir -p /tmp/clawapp/app/server
          cp clawapp-src/dist-server/index.js /tmp/clawapp/app/server/index.mjs
          chmod +x /tmp/clawapp/cmd/*
          ls /tmp/clawapp/cmd/
          ls /tmp/clawapp/app/

      - name: 打包 FPK
        run: |
          cd /tmp
          pfpt build --directory /tmp/clawapp
          find /tmp/clawapp -name "*.fpk" -exec ls -lh {} \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawapp-fpk
          path: /tmp/clawapp/*.fpk
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: clawapp-fpk
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## ClawApp FPK for 飞牛 fnOS
            安装后桌面图标直接打开，无需 Docker。
          files: artifacts/*.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
